<svg xmlns="http://www.w3.org/2000/svg" width="840" height="200" viewBox="0 0 840 200">
  <rect x="20" y="40" width="140" height="60" rx="6" fill="#eef2ff" stroke="#6366f1"/>
  <text x="90" y="75" font-family="Arial" font-size="12" text-anchor="middle">Raw Images</text>

  <rect x="200" y="30" width="160" height="80" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="280" y="75" font-family="Arial" font-size="12" text-anchor="middle">Preprocessing</text>

  <rect x="420" y="30" width="160" height="80" rx="6" fill="#ecfeff" stroke="#06b6d4"/>
